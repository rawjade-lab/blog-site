<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RawJadeLab :: Diary Log</title>
  <style>
    /* 폰트 불러오기 */
    @import url('https://fonts.googleapis.com/css2?family=Lobster&family=Reenie+Beanie&family=Racing+Sans+One&family=Darker+Grotesque:wght@400;700&family=Poor+Story&display=swap');

    :root { --bg-paper: #fcfbf3; --text-main: #2f3d31; --accent-red: #d9534f; }
    * { box-sizing: border-box; }

    /* 데스크탑 환경 커서 제어 */
    @media (min-width: 769px) {
        body { cursor: url('./image/icon/default.png') 16 16, auto; }
        .slide-container { cursor: url('./image/icon/default.png') 16 16, auto; }
        
        .memo-page:hover:before { 
            content: ""; position: absolute; left: 0; top: 0; width: 50px; height: 100%; 
            cursor: url('./image/icon/left.png') 16 16, w-resize; z-index: 10; 
        }
        .memo-page:hover:after { 
            content: ""; position: absolute; right: 0; top: 0; width: 50px; height: 100%; 
            cursor: url('./image/icon/right.png') 16 16, e-resize; z-index: 10; 
        }
    }

    body { 
        margin: 0; font-family: 'Poor Story', sans-serif; 
        background: url('./image/background.jpg') no-repeat center center fixed; 
        background-size: cover;
        min-height: 100dvh; display: flex; overflow: hidden; 
    }

    .slide-container { 
        flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
        padding: 40px 100px; align-items: center; 
    }

    .memo-page { 
        flex: 0 0 500px; width: 500px; height: 720px; background: var(--bg-paper); 
        scroll-snap-align: start; padding: 40px; border-right: 1px solid #dcdcdc; 
        display: flex; flex-direction: column; position: relative;
    }

    /* 게시글 본문: 줄바꿈 유지 및 Darker Grotesque 적용 */
    .post-content { 
        flex: 1; overflow-y: auto; min-height: 0; padding-right: 10px; z-index: 5;
        font-family: 'Darker Grotesque', 'Poor Story', sans-serif;
        font-size: 1.5rem; line-height: 1.6;
        white-space: pre-wrap; /* 원본 줄바꿈 유지 핵심 */
    }

    /* 게시글 타이틀: Racing Sans One 적용 */
    .memo-page h2 {
        position: relative; margin: 0 0 30px 0; font-size: 1.8rem; color: #333;
        background: #fff4a3; padding: 15px 20px; border-radius: 2px 10px 2px 10px;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.1); transform: rotate(-1.5deg);
        flex-shrink: 0; z-index: 5;
        font-family: 'Racing Sans One', 'Poor Story', sans-serif;
    }

    @media (max-width: 768px) {
      body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
      .fixed-profile { width: 100%; height: auto; padding: 20px; background: none; }
      .slide-container { padding: 20px; height: auto; }
      .memo-page { flex: 0 0 90vw; height: 500px; margin-right: 10px; }
    }

    .fixed-profile { width: 400px; flex-shrink: 0; padding: 40px; }
    
    #profileImg { 
        width: 150px; height: 150px; border-radius: 50%; 
        object-fit: cover; border: none; box-shadow: 4px 4px 8px rgba(0,0,0,0.1); 
        margin-bottom: 20px; 
    }
    
    /* 프로필 이름 & 소개글: 흰색 적용 */
    #profileName, #profileBio { color: #ffffff; }

    /* 프로필 이름: Lobster */
    #profileName { 
        margin: 0; font-size: 2.2rem; 
        font-family: 'Lobster', 'Poor Story', cursive;
    }
    
    /* 프로필 소개글: Reenie Beanie 적용 */
    #profileBio { 
        font-size: 1.7rem; line-height: 1.4; margin-top: 10px; 
        font-family: 'Reenie Beanie', 'Poor Story', cursive;
    }

    .post-content::-webkit-scrollbar { width: 4px; }
    .post-content::-webkit-scrollbar-thumb { background: #ccc; }
  </style>
</head>
<body>
  <div class="fixed-profile">
    <img id="profileImg" src="" alt="Profile">
    <h1 id="profileName">Loading...</h1>
    <p id="profileBio"></p>
  </div>
  <div class="slide-container" id="slideContainer" onclick="handleContainerClick(event)"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const USER = 'rawjade-lab'; 
    const REPO = 'rawjade-lab/codespaces-blank'; 
    const container = document.getElementById('slideContainer');
    async function loadProfile() {
      const res = await fetch(`https://api.github.com/users/${USER}`);
      const data = await res.json();
      document.getElementById('profileImg').src = data.avatar_url;
      document.getElementById('profileName').innerText = data.name || data.login;
      document.getElementById('profileBio').innerHTML = 'Motion Designer and Builder.<br>Exploring the space beyond design.';
    }
    async function loadIssues() {
      const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&sort=created&direction=desc`);
      const issues = await res.json();
      for (const issue of issues) {
        if (issue.pull_request) continue;
        const page = document.createElement('div');
        page.className = 'memo-page';
        // 마크다운 파싱을 유지하되 줄바꿈은 CSS로 제어
        page.innerHTML = `<h2>${issue.title}</h2><div class="post-content">${issue.body}</div>`;
        container.appendChild(page);
      }
    }
    function handleContainerClick(e) {
      if (window.innerWidth > 768) {
        const mid = window.innerWidth / 2;
        container.scrollBy({ left: (e.clientX < mid ? -500 : 500), behavior: 'smooth' });
      }
    }
    loadProfile();
    loadIssues();
  </script>
</body>
</html>
