<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RawJadeLab :: Diary Log</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    :root { --bg-paper: #fcfbf3; --text-main: #2f3d31; --accent-red: #d9534f; --bg-body: #e5e5e5; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Pretendard", sans-serif; background: var(--bg-body); min-height: 100dvh; display: flex; flex-direction: row; overflow: hidden; }

    /* 데스크탑: 가로 배치, 모바일: 세로 배치 */
    @media (max-width: 768px) {
      body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
      .fixed-profile { width: 100%; height: auto; padding: 20px; }
      .slide-container { padding: 20px; height: auto; }
      .memo-page { flex: 0 0 90vw; height: 500px; margin-right: 10px; }
    }

    /* 소개 영역 */
    .fixed-profile { width: 400px; flex-shrink: 0; padding: 40px; }
    .fixed-profile img { width: 300px; height: auto; border: 4px solid white; box-shadow: 4px 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .fixed-profile h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); }
    .fixed-profile p { font-size: 0.9rem; line-height: 1.5; color: #444; }

    /* 슬라이드 영역 */
    .slide-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 40px 100px; align-items: center; cursor: pointer; }
    
    /* 메모지 영역 */
    .memo-page { flex: 0 0 500px; width: 500px; height: 720px; background: var(--bg-paper); scroll-snap-align: start; padding: 40px; border-right: 1px solid #dcdcdc; display: flex; flex-direction: column; }
    
    .memo-page h2 { margin: 0 0 15px 0; font-size: 1.5rem; color: var(--text-main); border-bottom: 2px solid var(--accent-red); padding-bottom: 8px; flex-shrink: 0; }
    .post-content { flex: 1; overflow-y: auto; }
    .post-content::-webkit-scrollbar { width: 4px; }
    .post-content::-webkit-scrollbar-thumb { background: #ccc; }
  </style>
</head>
<body>

  <div class="fixed-profile">
    <img src="https://via.placeholder.com/300x200" alt="Profile">
    <h1>RawJadeLab</h1>
    <p>모션 디자이너이자 빌더.<br>디자인 그 이상을 고민합니다.<br><br>📧 email@example.com<br>🔗 rawjadelab.com</p>
  </div>

  <div class="slide-container" id="slideContainer" onclick="handleContainerClick(event)"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const REPO = 'rawjade-lab/codespaces-blank'; 
    const container = document.getElementById('slideContainer');

    async function loadIssues() {
      const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&sort=created&direction=desc`);
      const issues = await res.json();

      for (const issue of issues) {
        if (issue.pull_request) continue;
        const page = document.createElement('div');
        page.className = 'memo-page';
        page.innerHTML = `<h2>${issue.title}</h2><div class="post-content">${marked.parse(issue.body)}</div>`;
        container.appendChild(page);
      }
    }

    function handleContainerClick(e) {
      // 모바일에서는 스크롤 방식이 다르므로 데스크탑에서만 동작하게 처리
      if (window.innerWidth > 768) {
        const mid = window.innerWidth / 2;
        container.scrollBy({ left: (e.clientX < mid ? -500 : 500), behavior: 'smooth' });
      }
    }

    loadIssues();
  </script>
</body>
</html>
