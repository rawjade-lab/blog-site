<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RawJadeLab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffaf4;
        --surface: #ffffff;
        --text: #342d28;
        --muted: #7b6f69;
        --accent: #ff8e5e;
        --accent-dark: #e06a2f;
        --border: #f3e2d4;
        --soft: #fff2e9;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--bg), #fff3e8);
        color: var(--text);
        line-height: 1.7;
      }

      a { color: inherit; text-decoration: none; }

      .hero {
        background: linear-gradient(135deg, #ffe8d8 0%, #fffaf4 100%);
        color: var(--text);
        padding: 28px 24px 72px;
        border-bottom: 1px solid var(--border);
      }

      .nav {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.04em; color: var(--accent-dark); }
      .nav-links { display: flex; gap: 16px; color: var(--muted); font-size: 0.95rem; }

      .hero-content {
        max-width: 1200px;
        margin: 48px auto 0;
        display: grid;
        gap: 12px;
      }

      .hero-content h1 { font-size: clamp(2rem, 4vw, 3rem); margin: 0; }
      .hero-content p { margin: 0; max-width: 720px; font-size: 1.05rem; color: var(--muted); }

      .btn {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 18px;
        background: var(--soft);
        color: var(--accent-dark);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-weight: 700;
        width: fit-content;
      }

      .container {
        max-width: 1200px;
        margin: -36px auto 48px;
        padding: 0 24px;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 24px;
      }

      .card, .sidebar, .detail {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 10px 24px rgba(52, 45, 40, 0.06);
      }

      .sidebar {
        padding: 22px;
        height: fit-content;
      }

      .issue-list { display: grid; gap: 10px; }
      .issue-item {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: #fffdfa;
        cursor: pointer;
        text-align: left;
      }
      .issue-item.active { border-color: var(--accent); background: var(--soft); box-shadow: inset 0 0 0 1px var(--accent); }
      .issue-item strong { display: block; margin-bottom: 6px; }
      .issue-item span { color: var(--muted); font-size: 0.9rem; }

      .detail {
        padding: 24px;
        min-height: 380px;
      }
      .detail h2 { margin-top: 0; margin-bottom: 8px; }
      .detail-meta { color: var(--muted); font-size: 0.95rem; margin-bottom: 16px; }
      .post-body { color: #2f2c42; font-size: 1rem; }
      .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
        margin-top: 1.2em;
        margin-bottom: 0.6em;
        line-height: 1.25;
      }
      .post-body p { margin: 0 0 1rem; }
      .post-body ul, .post-body ol { padding-left: 1.2rem; margin: 0 0 1rem; }
      .post-body li { margin-bottom: 0.35rem; }
      .post-body blockquote {
        margin: 1rem 0;
        padding: 0.8rem 1rem;
        border-left: 4px solid var(--accent);
        background: #f7f5ff;
        color: #544f72;
      }
      .post-body pre {
        background: #1f1b2e;
        color: #f8f8f2;
        padding: 1rem;
        border-radius: 12px;
        overflow-x: auto;
      }
      .post-body code {
        background: #efe9ff;
        padding: 0.15rem 0.35rem;
        border-radius: 6px;
        font-size: 0.95em;
      }
      .post-body img {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: 12px;
        margin: 1rem 0;
        border: 1px solid var(--border);
      }
      .post-body a { color: var(--accent); text-decoration: underline; }
      .empty, .error, .loading { color: var(--muted); padding: 14px 0; }
      .error { color: #c0392b; }

      footer {
        text-align: center;
        color: var(--muted);
        padding: 0 24px 40px;
        font-size: 0.95rem;
      }

      @media (max-width: 900px) {
        .container { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <nav class="nav">
        <div class="brand">RawJadeLab</div>
        <div class="nav-links">
          <a href="#posts">포스트</a>
          <a href="#about">소개</a>
          <a href="#contact">연락처</a>
        </div>
      </nav>
      <div class="hero-content">
        <h1>My AI Journey</h1>
        <p>From Motion Designer to Product Builder</p>
        <a class="btn" href="#posts">Read the posts</a>
      </div>
    </header>

    <main class="container" id="posts">
      <aside class="sidebar" id="about">
        <div class="issue-list" id="issueList"></div>
      </aside>

      <section class="detail" aria-live="polite">
        <h2 id="detailTitle">이슈 목록을 불러오는 중입니다.</h2>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-body" id="detailBody">
          <div class="loading">GitHub API에서 글을 불러오고 있습니다.</div>
        </div>
      </section>
    </main>

    <footer>© 2026 RawJadeLab. All rights reserved.</footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const issueList = document.getElementById('issueList');
      const detailTitle = document.getElementById('detailTitle');
      const detailMeta = document.getElementById('detailMeta');
      const detailBody = document.getElementById('detailBody');
      const REPO = 'rawjade-lab/blog-site';
      let issues = [];
      let selectedNumber = null;
      let pollTimer = null;
      let lastSignature = '';

      function escapeHtml(value = '') {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function normalizeIssue(item) {
        return {
          number: item.number,
          title: item.title || '제목 없음',
          created_at: item.created_at || new Date().toISOString(),
          updated_at: item.updated_at || item.created_at || new Date().toISOString(),
          user: item.user || { login: 'rawjade-lab' },
          body: item.body || '',
          bodyHtml: ''
        };
      }

      function getSignature(items) {
        return items.map((issue) => `${issue.number}:${issue.updated_at}:${issue.title}:${issue.body}`).join('||');
      }

      function renderIssueList(items) {
        issueList.innerHTML = '';
        if (!items.length) {
          issueList.innerHTML = '<div class="empty">표시할 글이 없습니다.</div>';
          return;
        }

        const fragment = document.createDocumentFragment();
        items.forEach((issue) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'issue-item';
          button.dataset.number = issue.number;
          button.innerHTML = `<strong>${escapeHtml(issue.title)}</strong><span>#${issue.number} · ${new Date(issue.created_at).toLocaleDateString('ko-KR')}</span>`;
          button.addEventListener('click', () => showIssue(issue));
          fragment.appendChild(button);
        });
        issueList.appendChild(fragment);
      }

      function updateSelectedState(number) {
        document.querySelectorAll('.issue-item').forEach((item) => {
          item.classList.toggle('active', Number(item.dataset.number) === number);
        });
      }

      function renderBody(issue) {
        detailBody.innerHTML = '<div class="loading">본문을 렌더링하는 중입니다.</div>';

        const markdown = issue.body && issue.body.trim() ? issue.body : '본문이 없습니다.';
        let html = '';

        if (window.marked && typeof window.marked.parse === 'function') {
          html = window.marked.parse(markdown);
        } else {
          html = `<p>${escapeHtml(markdown)}</p>`;
        }

        detailBody.innerHTML = `<div class="post-body">${html}</div>`;
      }

      async function showIssue(issue) {
        selectedNumber = issue.number;
        detailTitle.textContent = issue.title;
        detailMeta.textContent = `#${issue.number} · ${issue.user?.login || 'unknown'} · ${new Date(issue.created_at).toLocaleDateString('ko-KR')} · 수정 ${new Date(issue.updated_at).toLocaleString('ko-KR')}`;
        renderBody(issue);
        updateSelectedState(issue.number);
      }

      async function loadIssues(repo, { silent = false, forceRefresh = false } = {}) {
        if (!silent) {
          detailTitle.textContent = '콘텐츠를 불러오는 중입니다.';
          detailMeta.textContent = '';
          detailBody.innerHTML = '<div class="loading">GitHub 이슈를 불러오고 있습니다.</div>';
          issueList.innerHTML = '<div class="loading">목록을 불러오고 있습니다.</div>';
        }

        try {
          const response = await fetch(`https://api.github.com/repos/${repo}/issues?state=all&per_page=20&sort=updated&direction=desc`, {
            headers: {
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'Mozilla/5.0'
            }
          });
          if (!response.ok) {
            throw new Error(`이슈를 불러오지 못했습니다. (${response.status})`);
          }

          const data = await response.json();
          const nextIssues = (data || []).filter((item) => !item.pull_request).map(normalizeIssue);
          const signature = getSignature(nextIssues);

          if (forceRefresh || signature !== lastSignature) {
            issues = nextIssues;
            lastSignature = signature;
            renderIssueList(issues);

            if (issues.length) {
              const selectedIssue = issues.find((item) => Number(item.number) === selectedNumber) || issues[0];
              await showIssue(selectedIssue);
            } else {
              detailTitle.textContent = '표시할 글이 없습니다.';
              detailMeta.textContent = '';
              detailBody.innerHTML = '<div class="empty">이 저장소에는 공개 이슈 글이 없습니다.</div>';
            }
          }
        } catch (error) {
          if (!silent) {
            detailTitle.textContent = '글을 불러오지 못했습니다.';
            detailMeta.textContent = '';
            detailBody.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
            issueList.innerHTML = '<div class="error">저장소 접근이 잠시 막혀 있습니다. 잠시 후 다시 시도해 주세요.</div>';
          }
        }
      }

      function startAutoRefresh() {
        if (pollTimer) {
          clearInterval(pollTimer);
        }

        pollTimer = window.setInterval(() => {
          if (document.visibilityState === 'visible') {
            loadIssues(REPO, { silent: true, forceRefresh: false });
          }
        }, 30000);
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          loadIssues(REPO, { silent: true, forceRefresh: true });
        }
      });

      window.addEventListener('focus', () => {
        loadIssues(REPO, { silent: true, forceRefresh: true });
      });

      loadIssues(REPO, { silent: false, forceRefresh: true }).then(() => {
        startAutoRefresh();
      });
    </script>
  </body>
</html>
